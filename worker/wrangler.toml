name = "gaato-counter"
main = "src/index.ts"
compatibility_date = "2026-01-20"

# Route the Worker on the same domain path.
# If you prefer a dedicated subdomain, remove this and use a Worker Custom Domain / route instead.
routes = [
  { pattern = "gaato.net/counter.svg*", zone_name = "gaato.net" },
  { pattern = "gaato.net/stats.svg*", zone_name = "gaato.net" },
  { pattern = "gaato.net/stats.json*", zone_name = "gaato.net" },
]

[[durable_objects.bindings]]
name = "COUNTER"
class_name = "CounterDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CounterDO"]
