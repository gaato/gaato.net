name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: hustcer/setup-moonbit@v1

      - uses: oven-sh/setup-bun@v2

      - run: moon update && bun install

      - name: Patch luna for current MoonBit on CI
        run: bun run prepare:moon

      - run: bun run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e7a568f5155a30c39bef74c957811587
        run: bunx wrangler pages deploy dist --project-name=gaato-net
