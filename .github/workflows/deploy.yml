name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v3
        with:
          install_args: moonbit

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - run: bun run check:toolchain

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run check:moon

      - run: bun run build

      - run: bun run validate:html

      - run: bun run check:size

      - name: Start preview server
        run: |
          bun run preview > /tmp/gaato-net-preview.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/gaato-net-preview.log
          exit 1

      - run: bun run check:a11y

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --root-dir ${{ github.workspace }}/dist --accept 200,204,206,429 dist/index.html dist/ja/index.html README.md dist/sitemap.xml dist/robots.txt dist/site.webmanifest

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e7a568f5155a30c39bef74c957811587
          DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          bunx wrangler pages deploy dist \
            --project-name=gaato-net \
            --branch="$DEPLOY_BRANCH" \
            --commit-hash="$GITHUB_SHA"
