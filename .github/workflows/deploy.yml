name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: hustcer/setup-moonbit@v1

      - uses: oven-sh/setup-bun@v2

      - run: moon update && bun install

      - name: Hydrate MoonBit dependencies
        run: moon build --release || true

      - name: Patch luna for current MoonBit on CI
        run: |
          python <<'PY'
          from pathlib import Path

          patches = {
              Path(".mooncakes/mizchi/luna/src/luna/signal/signal.mbt"): (
                  "let active = { val: true }",
                  "let active : Ref[Bool] = { val: true }",
              ),
              Path(".mooncakes/mizchi/luna/src/luna/signal/store_bench.mbt"): (
                  "let effect_runs = { val: 0 }",
                  "let effect_runs : Ref[Int] = { val: 0 }",
              ),
              Path(".mooncakes/mizchi/luna/src/platform/dom/element/render.mbt"): (
                  "let is_first = { val: true }",
                  "let is_first : Ref[Bool] = { val: true }",
              ),
          }

          for path, (before, after) in patches.items():
              text = path.read_text()
              if before in text:
                  path.write_text(text.replace(before, after))
                  text = path.read_text()
              if after not in text:
                  raise SystemExit(f"failed to patch {path}")
              print(f"patched {path}")
          PY

      - run: bun run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: e7a568f5155a30c39bef74c957811587
        run: bunx wrangler pages deploy dist --project-name=gaato-net
