name: Deploy to Cloudflare Pages

on:
  push:
    branches: [moonbit]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: hustcer/setup-moonbit@v1

      - uses: oven-sh/setup-bun@v2

      - run: moon update && bun install

      - name: Patch luna for current MoonBit on CI
        run: |
          perl -0pi -e 's/let active = \{ val: true \}/let active : Ref[Bool] = { val: true }/' .mooncakes/mizchi/luna/src/luna/signal/signal.mbt
          perl -0pi -e 's/let effect_runs = \{ val: 0 \}/let effect_runs : Ref[Int] = { val: 0 }/' .mooncakes/mizchi/luna/src/luna/signal/store_bench.mbt

      - run: bun run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=gaato-net
