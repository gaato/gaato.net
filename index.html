<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gaato.net</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --border: #d9d9d9;
        --text: #111111;
        --muted: #666666;
        --accent: #0f766e;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
          "Yu Gothic", sans-serif;
        min-height: 100vh;
        position: relative;
        background:
          radial-gradient(circle at top, rgba(15, 118, 110, 0.16), transparent 42%),
          linear-gradient(180deg, rgba(246, 250, 249, 0.72), rgba(255, 255, 255, 0.88)),
          var(--bg);
        color: var(--text);
        line-height: 1.72;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.4)),
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 32%);
        z-index: 1;
      }

      .background-automaton {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.96;
        z-index: 0;
      }

      #app {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 20px 64px;
        position: relative;
        z-index: 2;
      }

      .page {
        display: grid;
        gap: 32px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .lang-switcher {
        display: flex;
        gap: 8px;
      }

      .lang-switcher button {
        background: transparent;
        border: 0;
        color: var(--muted);
        padding: 6px 8px;
        min-width: 2.75rem;
        cursor: pointer;
        font-size: 0.95rem;
        line-height: 1;
        border-radius: 999px;
      }

      .lang-switcher button[data-active="true"] {
        color: var(--accent);
        background: rgba(15, 118, 110, 0.08);
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }

      .panel {
        padding: 0;
      }

      .panel + .panel {
        border-top: 1px solid var(--border);
        padding-top: 24px;
      }

      h1 {
        font-size: clamp(2.2rem, 7vw, 4rem);
        line-height: 1;
        margin-bottom: 12px;
      }

      .headline {
        font-size: 1.1rem;
        max-width: 42rem;
        margin-bottom: 12px;
      }

      .summary,
      .stack {
        display: grid;
        gap: 12px;
        color: var(--muted);
      }

      .hero-quote {
        margin-top: 18px;
        padding-left: 14px;
        border-left: 2px solid rgba(15, 118, 110, 0.28);
        color: var(--muted);
      }

      .hero-quote-text {
        font-size: 0.98rem;
        font-style: italic;
      }

      .hero-quote-author {
        margin-top: 6px;
        font-size: 0.82rem;
        letter-spacing: 0.04em;
      }

      .summary p,
      .stack p,
      .detail-list li,
      .link-note,
      .hero-quote p {
        max-width: 58ch;
        text-wrap: pretty;
      }

      .section-grid {
        display: grid;
        gap: 24px;
      }

      .section-title {
        font-size: 1rem;
        margin-bottom: 12px;
      }

      .card-title {
        font-size: 1rem;
        margin-bottom: 4px;
      }

      .meta-line {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 12px;
      }

      .detail-list,
      .links {
        list-style: none;
      }

      .detail-list {
        display: grid;
        gap: 10px;
        padding-left: 18px;
        list-style: disc;
      }

      .detail-list li {
        color: var(--muted);
      }

      .link-note {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .links {
        display: grid;
        gap: 10px;
      }

      .link-card {
        display: block;
        color: inherit;
        text-decoration: none;
      }

      .link-label-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 4px;
      }

      .link-label {
        font-size: 1rem;
      }

      .link-arrow {
        color: var(--accent);
      }

      @media (max-width: 760px) {
        #app {
          padding: 24px 16px 40px;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
