<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gaato.net</title>
    <style>
      :root {
        --bg: #f7f5ee;
        --border: rgba(33, 31, 27, 0.18);
        --text: #211f1b;
        --muted: #686257;
        --accent: #b1442f;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
          "Yu Gothic", sans-serif;
        min-height: 100vh;
        position: relative;
        background:
          radial-gradient(circle at 28% 0%, rgba(177, 68, 47, 0.16), transparent 34rem),
          radial-gradient(circle at 76% 18%, rgba(45, 103, 92, 0.14), transparent 28rem),
          linear-gradient(180deg, rgba(247, 245, 238, 0.78), rgba(247, 245, 238, 0.94)),
          var(--bg);
        color: var(--text);
        line-height: 1.64;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.4)),
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 32%);
        z-index: 1;
      }

      .background-automaton {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        opacity: 0.96;
        z-index: 0;
      }

      #app {
        max-width: 680px;
        margin: 0 auto;
        padding: 36px 20px 72px;
        position: relative;
        z-index: 2;
      }

      .page {
        display: grid;
        gap: 34px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .lang-switcher {
        display: flex;
        gap: 8px;
      }

      .lang-switcher button {
        background: transparent;
        border: 0;
        color: var(--muted);
        padding: 6px 8px;
        min-width: 2.75rem;
        cursor: pointer;
        font-size: 0.95rem;
        line-height: 1;
        border-radius: 999px;
      }

      .lang-switcher button[data-active="true"] {
        color: var(--accent);
        background: rgba(177, 68, 47, 0.08);
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }

      .panel {
        padding: 0;
      }

      .panel + .panel {
        border-top: 1px solid var(--border);
        padding-top: 24px;
      }

      h1 {
        font-size: clamp(2.4rem, 9vw, 5.4rem);
        letter-spacing: -0.07em;
        line-height: 0.92;
        margin-bottom: 12px;
      }

      .handle {
        color: var(--accent);
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        margin-bottom: 22px;
      }

      .summary {
        display: grid;
        gap: 6px;
        color: var(--muted);
      }

      .summary p {
        font-size: 1.06rem;
      }

      .summary p,
      .link-note {
        max-width: 58ch;
        text-wrap: pretty;
      }

      .section-title {
        font-size: 1rem;
        margin-bottom: 12px;
      }

      .links {
        list-style: none;
      }

      .link-note {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px 18px;
      }

      .link-card {
        display: block;
        color: inherit;
        text-decoration: none;
        padding: 10px 0;
        border-top: 1px solid var(--border);
      }

      .link-label-row {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 4px;
      }

      .link-label {
        font-size: 1rem;
      }

      .link-arrow {
        color: var(--accent);
      }

      @media (max-width: 760px) {
        #app {
          padding: 24px 16px 40px;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .links {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
